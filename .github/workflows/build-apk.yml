name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      # Always available under the workflow run's "Artifacts" section,
      # even for private repos or if the release step is skipped.
      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-activity-mediator-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # For public repos, this gives a permanent, no-login-required
      # download link under the repo's "Releases" tab.
      - name: Publish APK as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "الوسيط المدرسي والأنشطة — Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
