name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        id: pub_get
        shell: bash
        run: |
          set -o pipefail
          flutter pub get 2>&1 | tee pub_get.log
        continue-on-error: true

      - name: Surface pub get error as annotation
        if: steps.pub_get.outcome == 'failure'
        run: |
          tail -n 25 pub_get.log | while IFS= read -r line; do
            safe=$(echo "$line" | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error::$safe"
          done
          exit 1

      - name: Build release APK
        id: build_apk
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build_apk.log
        continue-on-error: true

      - name: Surface build error as annotation
        if: steps.build_apk.outcome == 'failure'
        run: |
          tail -n 25 build_apk.log | while IFS= read -r line; do
            safe=$(echo "$line" | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error::$safe"
          done
          exit 1

      # Always available under the workflow run's "Artifacts" section,
      # even for private repos or if the release step is skipped.
      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-activity-mediator-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # For public repos, this gives a permanent, no-login-required
      # download link under the repo's "Releases" tab.
      - name: Publish APK as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "الوسيط المدرسي والأنشطة — Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
